name: Scrape MLB Data

on:
  schedule:
    # 매시간 정각 (UTC). MLB는 미국 전역에서 경기가 진행되므로 24시간 매시간 업데이트 적합
    - cron: '0 * * * *'
  workflow_dispatch:  # 수동 실행 가능
  push:
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape-mlb.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: cd scraper && npm install --no-package-lock

      - name: Run scraper
        run: cd scraper && node scrape.js
        continue-on-error: true

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "✓ 변경사항 없음"
          else
            git commit -m "🤖 자동 업데이트 ($(date -u +%Y-%m-%dT%H:%MZ))"
            # 원격 변경사항이 있을 수 있으므로 rebase 후 push
            git pull --rebase origin main || true
            git push
          fi

      - name: Purge jsdelivr cache
        if: success()
        run: |
          # CDN 캐시 강제 갱신 (CF + FY 두 provider)
          for file in standings.json wildcard.json batters.json korean_players.json games.json meta.json; do
            curl -s "https://purge.jsdelivr.net/gh/officealone00/mlb-app@main/data/$file" || true
            curl -s "https://fastly.jsdelivr.net/gh/officealone00/mlb-app@main/data/$file" || true
          done
